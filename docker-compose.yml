version: "3.9"
services:
  go-server:
    restart: on-failure
    develop:
      watch:
        - action: sync
          path: ../
          target: /home/webuser
        - action: rebuild
          path: go.mod
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 8080:8080
    environment:
      - ENV=dev
      - PORT=8080
      - DATABASE_URL=postgres://pbac:pbac@postgres:5432/pbac?sslmode=disable
      - MIGRATION_PATH=/home/webuser/migrations
    depends_on:
      postgres:
        condition: service_healthy
    links:
      - postgres
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pbac
      POSTGRES_USER: pbac
      POSTGRES_PASSWORD: pbac
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pbac"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: